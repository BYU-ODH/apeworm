<h1>VowelWorm</h1>

<p>The VowelWorm can plot vowel features on a canvas in real-time. It is based on
the work done at the <a href="http://www.cp.jku.at/projects/realtime/vowelworm.html">
Department of Computational Perception at Johannes Kepler Universität Linz</a>.</p>
